<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - ImgUploadPreview</title>
  <style>
    input[type="file"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }

    img {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f5f5f5;
    }

    button {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #f2f2f2;
      cursor: pointer;
    }
  </style>
  <link rel="stylesheet" href="../TestPluginCommon/test-plugin-common.css" />
</head>
<body data-pp-observe-root-img-upload-preview>
  <h1>Prueba de plugin <code>ImgUploadPreview</code></h1>

  <section class="row">
    <label for="fileInput1">Imagen principal</label>
    <input
      id="fileInput1"
      type="file"
      accept="image/*"
      data-img-upload="input"
      data-img-upload-preview-target="#imgPreview1" />

    <img id="imgPreview1" alt="Vista previa principal" />
  </section>

  <button id="addDynamic">Agregar bloque dinámico</button>
  <div id="dynamicHost"></div>

  <script src="./imgUploadPreview.min.js"></script>
  <script>
    // Prueba opcional para verificar auto-init en nodos agregados dinámicamente.
    document.getElementById('addDynamic').addEventListener('click', function () {
      const host = document.getElementById('dynamicHost');
      host.insertAdjacentHTML(
        'beforeend',
        '<section class="row">' +
          '<label for="fileInputDynamic">Imagen dinámica</label>' +
          '<input id="fileInputDynamic" type="file" accept="image/*" data-img-upload="input" data-img-upload-preview-target="#imgPreviewDynamic" />' +
          '<img id="imgPreviewDynamic" alt="Vista previa dinámica" />' +
        '</section>'
      );
    });
  </script>
</body>
</html>
