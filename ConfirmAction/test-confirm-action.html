<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - ConfirmAction</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --card: #ffffff;
      --ink: #0f172a;
      --line: #dbe3ec;
      --brand: #1d4ed8;
      --danger: #b91c1c;
      --muted: #475569;
    }

    * { box-sizing: border-box; }
    h1, h2, h3 {
      margin: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    button, a.btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      width: fit-content;
    }

    button.primary {
      background: var(--brand);
      color: #ffffff;
    }

    button.danger, a.danger {
      background: var(--danger);
      color: #ffffff;
    }
    .log li {
      border: 1px solid #dbe3ec;
      border-radius: 8px;
      background: #ffffff;
      padding: 8px 10px;
      color: #334155;
      font-size: 14px;
    }
    .confirm-box.is-open {
      display: flex;
    }
  </style>
  <link rel="stylesheet" href="../TestPluginCommon/test-plugin-common.css" />
</head>
<body data-pp-observe-root-confirm-action>
  <main class="layout">
    <section class="panel">
      <h1>Prueba de plugin <code>ConfirmAction</code></h1>
      <p>Este test muestra confirmaciones antes de acciones sensibles en botones, links y formularios.</p>
    </section>

    <section class="panel grid">
      <article class="card">
        <h3>Accion destructiva (boton)</h3>
        <button
          id="btnDelete"
          class="danger"
          data-confirm-action
          data-ca-title="Eliminar registro"
          data-ca-message="Esta accion es permanente. Deseas eliminar?"
        >
          Eliminar registro
        </button>
      </article>

      <article class="card">
        <h3>Accion por link</h3>
        <a
          id="linkCancel"
          class="btn danger"
          href="#cancelado"
          data-confirm-action
          data-ca-title="Cancelar pedido"
          data-ca-message="Se cancelara el pedido actual. Continuar?"
        >
          Cancelar pedido
        </a>
      </article>

      <article class="card">
        <h3>Accion por submit</h3>
        <form
          id="formPublish"
          data-confirm-action
          data-ca-title="Publicar cambios"
          data-ca-message="Se publicaran cambios en produccion. Continuar?"
          action="#publicado"
          method="post"
        >
          <button type="submit" class="primary">Publicar</button>
        </form>
      </article>

      <article class="card">
        <h3>Contenedor personalizado</h3>
        <button
          id="btnReset"
          class="danger"
          data-confirm-action
          data-ca-title="Resetear configuracion"
          data-ca-message="Se perderan cambios no guardados. Deseas continuar?"
          data-ca-dialog="#customConfirm"
          data-ca-confirm-text="Si, resetear"
          data-ca-cancel-text="Mantener cambios"
          data-ca-deny-text="Solo limpiar filtros"
          data-ca-confirm-class="danger"
          data-ca-cancel-class="ghost"
          data-ca-deny-class="warn"
          data-ca-allow-outside-click="false"
        >
          Resetear configuracion
        </button>
      </article>
    </section>

    <section class="panel">
      <h2>Eventos</h2>
      <ul id="log" class="log"></ul>
    </section>
  </main>

  <div id="customConfirm" class="confirm-box" hidden>
    <section class="confirm-card" aria-modal="true" role="dialog" tabindex="-1">
      <h3 data-ca-dialog-title>Confirmar accion</h3>
      <p data-ca-dialog-message></p>
      <div class="confirm-actions">
        <button type="button" class="ghost" data-ca-cancel>Cancelar</button>
        <button type="button" class="warn" data-ca-deny hidden>Denegar</button>
        <button type="button" class="danger" data-ca-confirm>Confirmar</button>
      </div>
    </section>
  </div>

  <script src="./confirmAction.js"></script>
  <script>
    (function () {
      const log = document.getElementById('log')
          , subjects = document.querySelectorAll('[data-confirm-action]');

      function addLog(text) {
        const li = document.createElement('li');
        li.textContent = new Date().toLocaleTimeString() + ' - ' + text;
        log.prepend(li);
      }

      subjects.forEach(function (subject) {
        subject.addEventListener('before.plugin.confirmAction', function (evt) {
          addLog('before.plugin.confirmAction -> ' + evt.detail.actionType);
        });

        subject.addEventListener('confirmed.plugin.confirmAction', function (evt) {
          addLog('confirmed.plugin.confirmAction -> ' + evt.detail.actionType);
        });

        subject.addEventListener('cancelled.plugin.confirmAction', function (evt) {
          addLog('cancelled.plugin.confirmAction -> ' + evt.detail.actionType);
        });

        subject.addEventListener('denied.plugin.confirmAction', function (evt) {
          addLog('denied.plugin.confirmAction -> ' + evt.detail.actionType);
        });
      });

      const btnReset = document.getElementById('btnReset');
      window.ConfirmAction.destroy(btnReset);
      window.ConfirmAction.init(btnReset, {
        preConfirm: async function () {
          await new Promise(function (resolve) {
            setTimeout(resolve, 700);
          });
          return true;
        }
      });

      // Evita navegacion real en la demo para mantener el log visible.
      const link = document.getElementById('linkCancel');
      link.addEventListener('click', function (evt) {
        if (link.getAttribute('href') && link.getAttribute('href').startsWith('#')) {
          evt.preventDefault();
        }
      });

      // Evita submit real para visualizar confirmaciones en la misma pagina.
      const form = document.getElementById('formPublish');
      form.addEventListener('submit', function (evt) {
        evt.preventDefault();
        addLog('submit nativo bloqueado en demo (sin backend)');
      });
    })();
  </script>
</body>
</html>
