<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - ModalSteps</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #d6dee8;
      --brand: #0f766e;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }
    button {
      border: 1px solid transparent;
      background: var(--brand);
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .modal-shell {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 1000;
    }

    .modal-shell.modal-opened {
      display: block;
    }

    .modal-backdrop {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(2, 6, 23, 0.5);
    }

    .modal-card {
      width: min(620px, 100%);
      border: 1px solid #dbe3ec;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 22px 38px rgba(2, 6, 23, 0.25);
    }

    .modal-head,
    .modal-foot {
      padding: 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
    }

    .modal-foot {
      border-bottom: 0;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal-body {
      padding: 14px;
      display: grid;
      gap: 12px;
      min-height: 170px;
    }

    .step-title {
      margin: 0;
    }
    input,
    select {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 9px;
    }
    .log li {
      border: 1px solid #dbe3ec;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: #334155;
      font-size: 14px;
    }
  </style>
  <link rel="stylesheet" href="../TestPluginCommon/test-plugin-common.css" />
</head>
<body data-pp-observe-root-modal-steps>
  <main class="layout">
    <section class="panel">
      <h1>Prueba de plugin <code>ModalSteps</code></h1>
      <p>Este test no necesita backend: usa <code>fetch</code> simulado para devolver HTML de pasos.</p>

      <div class="actions">
        <button id="btnOpen" type="button" data-dialog-src="/steps/start">Abrir wizard</button>
        <button id="btnOpenGetNoForm" class="btn-secondary" type="button">Abrir ejemplo GET sin form</button>
      </div>
    </section>

    <section class="panel">
      <h2>Eventos</h2>
      <ul id="log" class="log"></ul>
    </section>
  </main>

  <div id="stepsModal" class="modal-shell" role="dialog" data-dialog="steps" aria-hidden="true">
    <div class="modal-backdrop">
      <article class="modal-card">
        <header class="modal-head">
          <strong>Wizard de ejemplo</strong>
        </header>

        <section class="modal-body" data-dialog="main"></section>

        <footer class="modal-foot">
          <button id="btnClose" class="btn-danger" type="button">Cerrar</button>
        </footer>
      </article>
    </div>
  </div>

  <script src="./modalSteps.min.js"></script>
  <script>
    (function () {
      // Referencias base del demo.
      const modal = document.getElementById('stepsModal')
          , btnOpen = document.getElementById('btnOpen')
          , btnOpenGetNoForm = document.getElementById('btnOpenGetNoForm')
          , btnClose = document.getElementById('btnClose')
          , log = document.getElementById('log');

      const step1 = [
        '<form action="/steps/submit-1" method="post">',
        '  <h3 class="step-title">Paso 1: Datos basicos</h3>',
        '  <div class="field">',
        '    <label for="name">Nombre</label>',
        '    <input id="name" name="name" required />',
        '  </div>',
        '  <div class="actions">',
        '    <button type="submit">Continuar</button>',
        '  </div>',
        '</form>'
      ].join('');

      const step2 = [
        '<form action="/steps/submit-2" method="post">',
        '  <h3 class="step-title">Paso 2: Confirmacion</h3>',
        '  <div class="field">',
        '    <label for="plan">Plan</label>',
        '    <select id="plan" name="plan" required>',
        '      <option value="">Selecciona...</option>',
        '      <option value="starter">Starter</option>',
        '      <option value="pro">Pro</option>',
        '    </select>',
        '  </div>',
        '  <div class="actions">',
        '    <button type="submit">Finalizar</button>',
        '  </div>',
        '</form>'
      ].join('');

      const finalHtml = [
        '<div>',
        '  <h3 class="step-title">Listo</h3>',
        '  <p>Tu flujo de steps finalizo correctamente.</p>',
        '</div>'
      ].join('');

      const noFormGetHtml = [
        '<div>',
        '  <h3 class="step-title">Ejemplo GET sin formulario</h3>',
        '  <p>Este contenido se cargo con <strong>GET</strong> usando el evento <code>shown.plugin.modalStep</code> y <code>stepRequest</code>.</p>',
        '  <p>No se envio ningun form; solo una solicitud GET para pintar este paso.</p>',
        '  <div class="actions">',
        '    <button type="button" class="btn-secondary" data-flow="no-form-next">Continuar al paso final (GET)</button>',
        '  </div>',
        '</div>'
      ].join('');

      const noFormGetStep2Html = [
        '<div>',
        '  <h3 class="step-title">Paso final del ejemplo GET</h3>',
        '  <p>Este es el segundo modal del flujo sin formulario, cargado con otra solicitud <strong>GET</strong>.</p>',
        '  <p>Puedes cerrar el modal o volver a iniciar cualquiera de los ejemplos.</p>',
        '</div>'
      ].join('');

      function addLog(text) {
        const li = document.createElement('li');
        li.textContent = new Date().toLocaleTimeString() + ' - ' + text;
        log.prepend(li);
      }

      function openModal(relatedTarget, extraDetail) {
        modal.classList.add('modal-opened');
        modal.removeAttribute('aria-hidden');
        modal.setAttribute('aria-modal', 'true');

        // Simula el evento de apertura esperado por ModalSteps.
        modal.dispatchEvent(new CustomEvent('shown.plugin.modalStep', {
          bubbles: true,
          detail: {
            relatedTarget: relatedTarget || null,
            ...(extraDetail || {})
          }
        }));
      }

      function closeModal() {
        modal.classList.remove('modal-opened');
        modal.removeAttribute('aria-modal');
        modal.setAttribute('aria-hidden', 'true');
        modal.dispatchEvent(new CustomEvent('hidden.plugin.modalStep', { bubbles: true }));
      }

      function bindUiEvents() {
        btnOpen.addEventListener('click', function () {
          openModal(this);
        });

        btnOpenGetNoForm.addEventListener('click', function () {
          // Ejemplo alterno: primer paso por GET sin formulario de inicio.
          openModal(this, {
            stepRequest: {
              url: '/steps/no-form-get',
              requestInit: {
                method: 'GET',
                headers: {
                  'X-Test-Flow': 'get-without-form'
                }
              }
            }
          });
        });

        btnClose.addEventListener('click', closeModal);

        // Delegacion para botones renderizados dinamicamente dentro del modal.
        modal.addEventListener('click', function (evt) {
          const nextBtn = evt.target.closest('[data-flow="no-form-next"]');
          if (!nextBtn || !modal.contains(nextBtn)) return;

          openModal(nextBtn, {
            stepRequest: {
              url: '/steps/no-form-get/final',
              requestInit: {
                method: 'GET',
                headers: {
                  'X-Test-Flow': 'get-without-form-step-2'
                }
              }
            }
          });
        });
      }

      function bindPluginEventLogs() {
        modal.addEventListener('shown.plugin.modalStep', function () {
          addLog('shown.plugin.modalStep');
        });

        modal.addEventListener('hidden.plugin.modalStep', function () {
          addLog('hidden.plugin.modalStep');
        });
      }

      const nativeFetch = window.fetch.bind(window);
      function installFetchMock() {
        // Mock local para probar el flujo sin backend real.
        window.fetch = async function (url, options) {
          const method = (options && options.method ? options.method : 'GET').toUpperCase();

          if (method === 'GET' && String(url).includes('/steps/start')) {
            return new Response(step1, {
              status: 200,
              headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
          }

          if (method === 'GET' && String(url).includes('/steps/no-form-get/final')) {
            return new Response(noFormGetStep2Html, {
              status: 200,
              headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
          }

          if (method === 'GET' && String(url).includes('/steps/no-form-get')) {
            return new Response(noFormGetHtml, {
              status: 200,
              headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
          }

          if (method === 'POST' && String(url).includes('/steps/submit-1')) {
            const body = options && options.body;
            const name = body instanceof FormData ? String(body.get('name') || '').trim() : '';
            if (!name) {
              return new Response(step1, {
                status: 400,
                headers: { 'Content-Type': 'text/html; charset=utf-8' }
              });
            }

            return new Response(step2, {
              status: 200,
              headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
          }

          if (method === 'POST' && String(url).includes('/steps/submit-2')) {
            const body = options && options.body;
            const plan = body instanceof FormData ? String(body.get('plan') || '').trim() : '';
            if (!plan) {
              return new Response(step2, {
                status: 400,
                headers: { 'Content-Type': 'text/html; charset=utf-8' }
              });
            }

            return new Response(finalHtml, {
              status: 200,
              headers: { 'Content-Type': 'text/html; charset=utf-8' }
            });
          }

          return nativeFetch(url, options);
        };
      }

      function initDemo() {
        bindUiEvents();
        bindPluginEventLogs();
        installFetchMock();
      }

      initDemo();
    })();
  </script>
</body>
</html>
