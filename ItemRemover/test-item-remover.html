<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - ItemRemover</title>
  <style>
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fafafa;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #f2f2f2;
      cursor: pointer;
    }
  </style>
  <link rel="stylesheet" href="../TestPluginCommon/test-plugin-common.css" />
</head>
<body data-pp-observe-root-item-remover>
  <h1>Prueba de plugin <code>ItemRemover</code></h1>
  <p class="note">Presiona Eliminar para quitar un item. El bloque dinamico valida auto-init sin llamadas manuales.</p>

  <section class="stack">
    <h2>Lista principal</h2>
    <ul id="todoList" class="list">
      <li class="item" data-remove-item="item">
        <span>Item 1</span>
        <button type="button" data-role="remove-item">Eliminar</button>
      </li>
      <li class="item" data-remove-item="item">
        <span>Item 2</span>
        <button type="button" data-role="remove-item">Eliminar</button>
      </li>
      <li class="item" data-remove-item="item">
        <span>Item 3</span>
        <button type="button" data-role="remove-item">Eliminar</button>
      </li>
    </ul>
  </section>

  <button id="addDynamic" type="button">Agregar item dinamico</button>

  <script src="./itemRemover.min.js"></script>
  <script>
    // Bloque opcional para probar que el MutationObserver inicializa nuevos items.
    let dynamicCounter = 4;
    document.getElementById('addDynamic').addEventListener('click', function () {
      const list = document.getElementById('todoList');
      list.insertAdjacentHTML(
        'beforeend',
        '<li class="item" data-remove-item="item">' +
          '<span>Item ' + dynamicCounter + '</span>' +
          '<button type="button" data-role="remove-item">Eliminar</button>' +
        '</li>'
      );
      dynamicCounter += 1;
    });
  </script>
</body>
</html>
