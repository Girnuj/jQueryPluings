<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - ReplaceMe</title>
  <style>
    button {
      padding: 8px 12px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #f2f2f2;
      cursor: pointer;
    }
    .remote-box {
      border-left: 4px solid #4a90e2;
      background: #eef6ff;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
  <link rel="stylesheet" href="../TestPluginCommon/test-plugin-common.css" />
</head>
<body data-pp-observe-root-replace-me>
  <h1>Prueba de plugin <code>ReplaceMe</code></h1>
  <p class="note">Este demo simula un endpoint remoto para probar el reemplazo sin backend.</p>

  <section class="stack">
    <div class="panel">
      <h2>Ejemplo avanzado: modo JSON, target y eventos</h2>
      <!-- destruye nodo despues de reemplazar -->
      <div id="card-container" class="remote-box">Zona a reemplazar por JSON</div>
        <button
          type="button"
          data-role="replace-me"
          data-replace-me-src="/demo/replace-json"
          data-replace-me-mode="json"
          data-replace-me-target="#card-container"
          data-replace-me-json-html="content"
          data-replace-me-json-redirect="nextUrl">
          Actualizar tarjeta (JSON)
        </button>
    </div>


    <div class="panel">
      <h2>Ejemplo con POST</h2>
      <button
        type="button"
        data-role="replace-me"
        data-replace-me-src="/demo/replace-html"
        data-replace-me-method="POST">
        Reemplazar con POST
      </button>
    </div>

    <div class="panel">
      <h2>Ejemplo con GET</h2>
      <button
        type="button"
        data-role="replace-me"
        data-replace-me-src="/demo/replace-html"
        data-replace-me-method="GET">
        Reemplazar con GET
      </button>
    </div>

    <button id="addDynamic" type="button">Agregar trigger dinamico</button>
    <div id="dynamicHost" class="panel"></div>
  </section>
 
  <script src="./replaceMe.js"></script>
  <script>
    // Simulador de endpoint para que el ejemplo funcione sin servidor.
    (function () {
      const originalFetch = window.fetch.bind(window);

      window.fetch = async function (input, init) {
        const url = typeof input === 'string' ? input : input.url;

        const requestMethod = (init && init.method ? init.method : 'GET').toUpperCase();

        if (url === '/demo/replace-html' && (requestMethod === 'POST' || requestMethod === 'GET')) {
          const html =
            '<section>' +
              '<div class="remote-box">' +
                '<strong>Contenido remoto cargado</strong>' +
                '<p>Este HTML fue devuelto por un fetch simulado usando <b>' + requestMethod + '</b>.</p>' +
              '</div>' +
            '</section>';

          return new Response(html, {
            status: 200,
            headers: { 'Content-Type': 'text/html; charset=utf-8' },
          });
        }

        if (url === '/demo/replace-json' && requestMethod === 'POST') {
          //en otro ejemplo de integracion se muestra la union de este plugin con templateRenderizer para ver datos JSON en HTML remoto.
          const json = {
            content: '<div class="remote-box"><b>Tarjeta actualizada vía JSON</b><br>HTML desde JSON simulado.</div>',
            nextUrl: null // o pon una URL para probar redirección
          };
          return new Response(JSON.stringify(json), {
            status: 200,
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
          });
        }
        return originalFetch(input, init);
      };
    })();
  </script>

  <script>
    // Ejemplo de escucha de eventos del ciclo de vida
    document.addEventListener('replace-me:success', (e) => {
      console.log('Reemplazado:', e.detail);
    });
    document.addEventListener('replace-me:error', (e) => {
      console.error('Falló:', e.detail.error);
    });
    document.addEventListener('replace-me:before', (e) => {
      // Puedes cancelar el reemplazo con e.preventDefault();
      // console.log('Antes de reemplazar', e.detail);
    });
    document.addEventListener('replace-me:after', (e) => {
      // Siempre se dispara al final
      // console.log('Después de reemplazar', e.detail);
    });

    document.getElementById('addDynamic').addEventListener('click', function () {
      const host = document.getElementById('dynamicHost');
      host.insertAdjacentHTML(
        'beforeend',
        '<button type="button" data-role="replace-me" data-replace-me-src="/demo/replace-html" data-replace-me-method="POST">' +
          'Reemplazar trigger dinamico (POST)' +
        '</button>'
      );
    });
  </script>
</body>
</html>
